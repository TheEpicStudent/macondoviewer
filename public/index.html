<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macondo Viewer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1 style="padding-top: 10px; margin-bottom: 0;">Macondo Viewer</h1>
    <div class="lazyhorizontal">
        <button id="projectsbtn" onclick="clearProjects(); setTimeout(() => {ExploreProjects('0', document.getElementById('sort').value, document.getElementById('status').value); ExploreProjects('5', document.getElementById('sort').value, document.getElementById('status').value)}, 500)">Projects</button>
        <button id="usersbtn" onclick="clearProjects(); setTimeout(() => {ExploreUsers()}, 1000)">Users</button>
        <button id="searchbtn" onclick="toggle('search')">Search</button>
    </div>
    <div class="lazyhorizontal">
    <select id="sort" onchange="clearProjects(); setTimeout(() => {ExploreProjects('0', this.value); ExploreProjects('5', this.value)}, 500)">
            <option value="popularity">Popular</option>
            <option value="recently_updated">Recently Updated</option>
            <option value="newest">Newest</option>
    </select>
    <select id="status" onchange="clearProjects(); setTimeout(() => {ExploreProjects('0', document.getElementById('sort').value, this.value); ExploreProjects('5', document.getElementById('sort').value, this.value)}, 500)">
            <option value="shipped">Shipped</option>
            <option value="in_progress">In Progress</option>
            <option value="all">All</option>
    </select>
    <input type="text" id="search" placeholder="Search" style="display: none;" rows="1"></input>
    </div>
    <div class="seperator"></div>
    <br>
    <div id="app" class="app">
        <svg id="loader" width="150px" fill="#555" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="4" cy="12" r="3" opacity="1"><animate id="spinner_qYjJ" begin="0;spinner_t4KZ.end-0.25s" attributeName="opacity" dur="0.75s" values="1;.2" fill="freeze"/></circle><circle cx="12" cy="12" r="3" opacity=".4"><animate begin="spinner_qYjJ.begin+0.15s" attributeName="opacity" dur="0.75s" values="1;.2" fill="freeze"/></circle><circle cx="20" cy="12" r="3" opacity=".3"><animate id="spinner_t4KZ" begin="spinner_qYjJ.begin+0.3s" attributeName="opacity" dur="0.75s" values="1;.2" fill="freeze"/></circle></svg>
        <noscript>Woah woah woah, you need JavaScript enabled</noscript>
    </div>
    <div class="app" id="app2"></div>
    <button id="more" onclick="clearProjects(); setTimeout(() => {ExploreProjects(cursorDJ, document.getElementById('sort').value, document.getElementById('status').value); ExploreProjects(cursorDJ + 5, document.getElementById('sort').value, document.getElementById('status').value)}, 500);">Show More</button>
    <div class="error" id="error">
        <h2>Uh oh, something went wrong...</h2>
        <p id="errorp">{error}</p>
    </div>
    <div class="warning-popup" id="warning-popup">
        <h1>Hey, wait</h1>
        <p>This link is taking you to {url}. Are you sure you want to go there?</p>
        <button id="warn-confirm">Yes, take me there</button>
        <button id="warn-cancel">No, go back</button>
    </div>
    <script src="index.js"></script>
</body>
</html>
